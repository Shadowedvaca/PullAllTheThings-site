server {
    listen 80;
    server_name dev.pullallthethings.com;
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl;
    server_name dev.pullallthethings.com;

    # SSL cert covers both dev and test subdomains
    ssl_certificate /etc/letsencrypt/live/dev.pullallthethings.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/dev.pullallthethings.com/privkey.pem;

    # Basic auth — protect dev env from public access
    # Credentials: admin / patt-dev-2026  (htpasswd file managed on server)
    auth_basic "Guild Portal — Dev Environment";
    auth_basic_user_file /etc/nginx/htpasswd/dev;

    location /static/ {
        alias /opt/guild-portal/src/guild_portal/static/;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    location / {
        proxy_pass http://127.0.0.1:8102;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
