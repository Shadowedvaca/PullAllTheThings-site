services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: guild_user
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: guild_db
    volumes:
      - guild_pgdata:/var/lib/postgresql/data
      - ./deploy/setup_postgres.sql:/docker-entrypoint-initdb.d/01-setup.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U guild_user"]
      interval: 5s
      timeout: 3s
      retries: 5

  app:
    build: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    ports:
      - "8100:8100"

volumes:
  guild_pgdata:
